name: Build and Push Docker Image

# Trigger the workflow on every git push to the "main" branch
on:
  push:
    branches: [ "main" ]

# Global environment variables
env:
  REGISTRY: ghcr.io
  # github.repository automatically converts to "your-username/your-repo-name"
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # =========================================================
  # JOB 1: Continuous Integration (Build, Test and Push Image)
  # =========================================================
  build-and-push:
    runs-on: ubuntu-latest
    
    # Explicitly grant write permissions to publish packages to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Check out the source code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up isolated Python environment to run local tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install application requirements and run a basic syntax compilation test
      - name: Install dependencies and test
        run: |
          pip install -r requirements.txt
          python -m py_compile main.py

      # Step 4: Configure Docker Buildx engine for optimized multi-stage caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Authenticate against GitHub Container Registry using native automation token
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Generate dynamic tags and metadata based on git commit parameters
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      # Step 7: Build the optimized image and push it to GitHub Packages (GHCR)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # =========================================================
  # JOB 2: Continuous Delivery (Automated Deploy to Minikube)
  # =========================================================
  deploy-to-minikube:
    needs: build-and-push # Execute CD pipeline only if the CI image build succeeded
    runs-on: [self-hosted, local-kube] # Targets your local VirtualBox self-hosted agent

    steps:
      # Step 1: Check out the repository to fetch the latest Helm manifests
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Execute Helm upgrade and force Kubernetes to poll the newly pushed image
      - name: Deploy to Minikube via Helm
        run: |
          echo "Starting CD deployment pipeline on local runner..."
          # Upgrade or install the release and enforce immediate image re-pulling
          helm upgrade --install my-release ./charts/my-devops-app --set image.pullPolicy=Always
          
          # Block the step until the rolling update completes successfully or hits a timeout
          kubectl rollout status deployment/my-release-my-devops-app --timeout=60s

