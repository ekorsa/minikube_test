apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-devops-app.fullname" . }}
  labels:
    {{- include "my-devops-app.labels" . | nindent 4 }}
spec:
  replicas: 1 # For stateful apps with PVC on local minikube, 1 replica is stable
  selector:
    matchLabels:
      {{- include "my-devops-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "my-devops-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
        # 1. FastAPI Application Container
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: ENV_NAME
              value: "minikube-production"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

        # 2. Prometheus Container (Sidecar)
        - name: prometheus
          image: prom/prometheus:v2.45.0
          ports:
            - name: prom-port
              containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yaml"
            - "--storage.tsdb.path=/prometheus" # Path to internal database
            - "--storage.tsdb.retention.time=15d" # Keep logs for 15 days
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: prom-port
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: prom-port
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus # Mounting the persistent volume here

        # 3. Grafana Container (Sidecar)
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - name: grafana-port
              containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: grafana-port
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: grafana-port
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: fastapi-dashboard-volume
              mountPath: /dashboards

      # Defining volumes to be used by containers above
      volumes:
        - name: prometheus-config
          configMap:
            name: monitoring-configs
            items:
              - key: prometheus.yaml
                path: prometheus.yaml
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-storage-pvc # Binding to the PVC from Step 2
        - name: grafana-datasources
          configMap:
            name: monitoring-configs
            items:
              - key: prometheus-datasource.yaml
                path: prometheus.yaml
        - name: grafana-dashboards-provider
          configMap:
            name: monitoring-configs
            items:
              - key: dashboards-provider.yaml
                path: dashboards.yaml
        - name: fastapi-dashboard-volume
          configMap:
            name: fastapi-dashboard-json
            items:
              - key: fastapi.json
                path: fastapi.json
