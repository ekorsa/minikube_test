apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-configs
data:
  # Prometheus configuration (Targeting local service name)
  prometheus.yaml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: "fastapi-app"
        static_configs:
          - targets: ["{{ include "my-devops-app.fullname" . }}:80"]

  # Grafana data source configuration
  prometheus-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://localhost:9090
        isDefault: true

  # Grafana dashboards provider configuration
  dashboards-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'FastAPI Dashboards'
        orgId: 1
        folder: 'FastAPI'
        type: file
        disableDeletion: false
        options:
          path: /dashboards

